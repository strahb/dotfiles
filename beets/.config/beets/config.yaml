directory: ~/Music/LibraryFLAC
library: ~/.config/beets/library.db
pluginpath:
    - ~/.config/beets/beetsplug

# Global art settings (Applies to fetchart, embedart, and convert)
art_filename: cover

plugins: 
    - musicbrainz
    - embedart
    - convert
    - spectralcheck
    - fetchart
    - scrub
    - replaygain
    - inline
    - info
    - mbsync
    - lastgenre
    - edit
    - lastimport

scrub:
    auto: yes

embedart:
    auto: no             # !! This stops Beets from embedding art on import
    remove_art_file: no  

import:
    move: yes
    write: yes
    copy: no
    resume: ask
    incremental: yes

# Library naming convention
paths:
    default: $albumartist/$album%aunique{}/%if{$d_folder, $d_folder/}$p_track. $title
    singleton: Non-Album/$artist/$p_track. $title
    comp: Compilations/%if{$label, $label/}$album%aunique{}/%if{$d_folder, $d_folder/}$p_track. $title

item_fields:
    # 2-digit padded track (with failsafe for missing tags)
    p_track: u"%02i" % (track or 0)
    
    # 2-digit padded disc folder, but only if it's a multi-disc album
    d_folder: |
        if disctotal and disctotal > 1:
            return u"%02i" % (disc or 0)
        else:
            return u""
            
    # Always gets the first (highest weighted) genre from the list
    top_genre: |
        if genres:
            return genres[0]
        return u"Unknown"

fetchart:
    auto: yes
    sources:
        - filesystem
        - coverart
        - itunes
        - amazon
        - albumart
        - '*'
    minwidth: 1000        
    maxwidth: 2000        # (Optional) Downscales massive 5K images to save disk space
    high_resolution: yes  # Forces iTunes to pull their hidden 4K covers instead of standard 600px ones

embedart:
    auto: yes
    remove_art_file: no

musicbrainz:
    genres: yes
    extra_tags: [year, label, catalogue_number]
    ratelimit: 1.5

lastfm:
    user: Strobii

replaygain:
    backend: ffmpeg
    auto: yes